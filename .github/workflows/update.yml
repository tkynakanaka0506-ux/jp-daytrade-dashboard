name: Update JP Daytrade Dashboard

on:
  schedule:
    - cron: '0 21 * * *'   # 06:00 JST = 21:00 UTC(前日) → 朝の更新
    - cron: '0 12 * * *'   # 21:00 JST = 12:00 UTC → 夜(引け後)の更新
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード(morning または evening)'
        required: false
        default: 'morning'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 実行モードを判定
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 21 * * *" ]; then
            echo "mode=morning" >> "$GITHUB_OUTPUT"
          else
            echo "mode=evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Java 21 セットアップ
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Python セットアップ(HTML生成用・ネットワーク不要)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Javaプログラムをビルド
        run: mvn -q -B package

      - name: データ取得・data.json更新(Java)
        run: java -jar target/dashboard-updater.jar "${{ steps.mode.outputs.mode }}" data.json

      - name: HTML再生成(既存のPure Pythonレンダラー)
        run: python3 render_dashboard.py data.json index.html

      - name: 差分があればcommit & push
        run: |
          git config user.name "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto update (${{ steps.mode.outputs.mode }}) $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
